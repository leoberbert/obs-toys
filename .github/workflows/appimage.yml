name: Build AppImage

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag (example: v0.1.0)"
        required: true
      release_name:
        description: "Release title"
        required: false
        default: "OBS Toys Release"

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-1 \
            libadwaita-1-0 \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            python3-gi \
            python3-venv \
            python3-pip \
            desktop-file-utils \
            libfuse2t64 \
            curl \
            gh \
            attr

      - name: Build AppImage
        run: |
          chmod +x packaging/linux/build-appimage.sh
          packaging/linux/build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v6
        with:
          name: obs-toys-appimage
          path: dist/appimage/OBS-Toys-x86_64.AppImage

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          gh release view "$VERSION" >/dev/null 2>&1 || \
            gh release create "$VERSION" \
              --target "${GITHUB_SHA}" \
              --title "$RELEASE_NAME $VERSION" \
              --generate-notes
          gh release upload "$VERSION" dist/appimage/OBS-Toys-x86_64.AppImage --clobber
